; Hardened PHP defaults shared across images
expose_php=0
allow_url_fopen=0
allow_url_include=0
session.cookie_httponly=1
session.cookie_samesite=Strict
session.use_strict_mode=1
session.use_only_cookies=1
cgi.fix_pathinfo=0
file_uploads=On
upload_max_filesize=10M
post_max_size=12M
max_execution_time=120
memory_limit=256M
